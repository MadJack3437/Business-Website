<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Management</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { width: 100px; height: auto; border-radius: 50%; border: 2px solid #a855f7; box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        h1 { color: #a855f7; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        .nav-link { color: #38bdf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; font-weight: bold; }
        
        .management-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h2 { color: #f1f5f9; font-size: 1.2rem; border-bottom: 1px solid #1e293b; padding-bottom: 10px; margin-top: 0; }
        
        /* Archive Styling */
        .archive-list { margin-top: 15px; }
        .archive-item { 
            background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .archive-info { font-size: 0.85rem; }
        .archive-date { color: #a855f7; font-weight: bold; display: block; }
        .view-btn { background: #38bdf8; color: #020617; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .delete-btn { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; margin-left: 5px; }

        .action-btn { display: block; width: 100%; padding: 10px; margin-top: 15px; background: #1e293b; color: #a855f7; text-align: center; border-radius: 6px; border: 1px solid #a855f7; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/dtHffs97/75cb50d9389d910e9781b944fceed68b.webp" alt="Logo" class="logo">
        <h1>Management Portal</h1>
    </header>

    <a href="index.html" class="nav-link">← Return to Staff Logs</a>

    <div class="management-grid">
        <div class="card" style="grid-column: span 2; border-color: #38bdf8;">
            <h2 style="color: #38bdf8;">📁 Saved Log History</h2>
            <p style="font-size: 0.8rem; color: #64748b;">Every CSV you upload on the main page is automatically stored here.</p>
            <div id="archive-container" class="archive-list">
                </div>
            <button class="action-btn" style="border-color: #ef4444; color: #ef4444; margin-top: 20px; width: auto;" onclick="clearAllLogs()">Wipe All History ⚠️</button>
        </div>

        <div class="card" style="border-color: #ef4444;">
            <h2 style="color: #ef4444;">Staff Strike Tracker</h2>
            <p>Recent strikes issued to business members.</p>
            <div id="strike-summary"></div>
            <a href="#" class="action-btn" style="border-color: #ef4444;">Manage Strikes</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            displayArchive();
        };

        function displayArchive() {
            const container = document.getElementById('archive-container');
            const logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];

            if (logs.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.5;">No saved logs found.</p>';
                return;
            }

            container.innerHTML = '';
            logs.reverse().forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'archive-item';
                div.innerHTML = `
                    <div class="archive-info">
                        <span class="archive-date">${log.date}</span>
                        <span style="opacity:0.7">${log.fileName}</span>
                    </div>
                    <div>
                        <button class="view-btn" onclick="viewLog(${index})">Download CSV</button>
                        <button class="delete-btn" onclick="deleteLog(${index})">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function viewLog(index) {
            const logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            const log = logs.reverse()[index];
            const blob = new Blob([log.rawData], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `RESTORED_${log.fileName}`;
            a.click();
        }

        function deleteLog(index) {
            if(!confirm("Delete this log permanently?")) return;
            let logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            logs.reverse().splice(index, 1);
            localStorage.setItem('businessLogHistory', JSON.stringify(logs.reverse()));
            displayArchive();
        }

        function clearAllLogs() {
            if(!confirm("EXTREME WARNING: This will delete EVERY saved CSV. Proceed?")) return;
            localStorage.removeItem('businessLogHistory');
            displayArchive();
        }
    </script>
</body>
</html>
