<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Management Portal</title>
    <style>
        /* Global Reset & Scrollbar Removal */
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: #020617; font-family: 'Inter', sans-serif; color: #f1f5f9;
            display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; padding: 20px 0 10px 0; flex-shrink: 0; }
        .logo { width: 100px; border-radius: 50%; border: 2px solid #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        h1 { color: #ef4444; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin: 10px 0; }
        
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .nav-link:hover { color: #ef4444; }

        .content-area {
            flex: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column;
            align-items: center; overflow-y: auto; padding: 10px; box-sizing: border-box;
            scrollbar-width: thin; scrollbar-color: #ef4444 #020617;
        }

        .search-container { width: 100%; margin-bottom: 15px; }
        #staff-search {
            width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #1e293b;
            background: #0f172a; color: white; font-size: 0.9rem; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        #staff-search:focus { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }

        #top-member-banner {
            width: 100%; background: linear-gradient(90deg, #1e293b, #7f1d1d);
            border: 1px solid #ef4444; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; text-align: center; display: none; box-sizing: border-box;
        }

        .stats-bar { 
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 15px 20px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; 
        }
        
        .totals { font-weight: bold; color: #ef4444; font-size: 0.95rem; }

        .mgmt-actions { width: 100%; display: flex; gap: 10px; margin-bottom: 15px; }
        .mgmt-actions button { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        
        .btn-blue { background: #38bdf8; color: #020617; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red-outline { background: transparent; border: 1px solid #ef4444 !important; color: #ef4444; }

        .log-card {
            width: 100%; background: #0f172a; border: 1px solid #1e293b; 
            border-radius: 12px; padding: 15px; margin-bottom: 10px; box-sizing: border-box;
        }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .log-date { font-weight: bold; color: #f87171; }
        
        footer { 
            width: 100%; padding: 15px 20px 25px 20px; background: #020617; 
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; border-top: 1px solid #1e293b; box-sizing: border-box;
        }
        .back-btn { padding: 12px 30px; background: #0f172a; color: #ef4444; border: 2px solid #ef4444; border-radius: 10px; font-weight: 800; cursor: pointer; text-decoration: none; font-size: 0.85rem; order: 2; transition: 0.3s;}
        .back-btn:hover { background: #ef4444; color: #020617; }
        
        .powered-by { font-size: 0.65rem; color: #475569; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; order: 1; }
        .match-highlight { color: #f87171; font-weight: bold; }
        .search-results-box { margin-top:8px; padding:8px; border-top:1px solid #1e293b; background: rgba(239, 68, 68, 0.05); border-radius: 6px; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/dtHffs97/75cb50d9389d910e9781b944fceed68b.webp" alt="Logo" class="logo">
        <h1>Management Portal</h1>
        <a href="index.html" class="nav-link">← Return to Staff Logs</a>
    </header>

    <div class="content-area">
        <div class="search-container">
            <input type="text" id="staff-search" placeholder="Search staff name or ID across all saved logs..." onkeyup="loadHistory()">
        </div>

        <div id="top-member-banner">
            <h3 style="margin: 0; color: #fecaca; font-size: 0.8rem; text-transform: uppercase;">🏆 Current Top Performer</h3>
            <p id="top-member-info" style="margin: 5px 0 0 0; font-weight: bold; color: #ffffff; font-size: 1.1rem;">No data saved yet</p>
        </div>

        <div class="stats-bar">
            <div class="totals">
                <span id="saved-logs-count">Reports: 0</span> | <span id="grand-total-hours">Lifetime: 0 hrs</span>
            </div>
            <button class="btn-red-outline" style="padding: 5px 10px; font-size: 0.7rem;" onclick="clearHistory()">Wipe All ⚠️</button>
        </div>

        <div class="mgmt-actions">
            <button class="btn-blue" onclick="downloadBackup()">Download Backup 📥</button>
            <button class="btn-green" onclick="document.getElementById('import-file').click()">Restore History 📤</button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(this)">
        </div>

        <div id="logs-container" style="width: 100%;"></div>
    </div>

    <footer>
        <span class="powered-by">Powered by SACRP Business Management</span>
        <a href="index.html" class="back-btn">RETURN TO LOGS</a>
    </footer>

    <script>
        function loadHistory() {
            const logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            const searchTerm = document.getElementById('staff-search').value.toLowerCase();
            const container = document.getElementById('logs-container');
            const logCountDisp = document.getElementById('saved-logs-count');
            const totalHrsDisp = document.getElementById('grand-total-hours');
            const topBanner = document.getElementById('top-member-banner');
            const topInfo = document.getElementById('top-member-info');

            container.innerHTML = '';
            let grandTotalMins = 0;
            let currentMVPMins = -1;
            let currentMVPName = "";

            logs.forEach(log => {
                const rows = log.rawData.trim().split(/\r?\n/);
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) continue;
                    grandTotalMins += parseInt(cols[3].replace(/"/g, '')) || 0;
                }
            });

            [...logs].reverse().forEach((log, index) => {
                const rows = log.rawData.trim().split(/\r?\n/);
                let reportMins = 0, reportTopMins = -1, reportTopMember = "";
                let foundInSearch = false, searchMatchDetails = "";

                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 4) continue;
                    const name = cols[0].replace(/["~]/g, '').trim();
                    const id = cols[1].replace(/"/g, '').trim();
                    const mins = parseInt(cols[3].replace(/"/g, '')) || 0;
                    reportMins += mins;

                    if (mins > reportTopMins) {
                        reportTopMins = mins;
                        reportTopMember = `${name} (${(mins/60).toFixed(1)} hrs)`;
                    }
                    if (index === 0 && mins > currentMVPMins) {
                        currentMVPMins = mins;
                        currentMVPName = `${name} (${id}) — ${(mins/60).toFixed(1)} hrs`;
                    }
                    if (searchTerm && (name.toLowerCase().includes(searchTerm) || id.includes(searchTerm))) {
                        foundInSearch = true;
                        searchMatchDetails += `• ${name}: <span class="match-highlight">${(mins/60).toFixed(1)} hrs</span><br>`;
                    }
                }

                if (!searchTerm || foundInSearch) {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    card.innerHTML = `
                        <div class="log-header">
                            <span class="log-date">${log.date}</span>
                            <span style="color:#ef4444; font-weight:bold;">${(reportMins/60).toFixed(1)} Total Hrs</span>
                        </div>
                        <div style="font-size:0.8rem; color:#94a3b8;">
                            <strong>File:</strong> ${log.fileName}<br>
                            <strong>Weekly MVP:</strong> ${reportTopMember}
                            ${searchTerm ? `<div class="search-results-box"><strong>Search Results:</strong><br>${searchMatchDetails}</div>` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

            topBanner.style.display = currentMVPName ? 'block' : 'none';
            topInfo.innerText = currentMVPName || "No data saved yet";
            logCountDisp.innerText = `Reports: ${logs.length}`;
            totalHrsDisp.innerText = `Lifetime: ${(grandTotalMins/60).toFixed(1)} hrs`;
        }

        function downloadBackup() {
            const data = localStorage.getItem('businessLogHistory');
            if (!data || data === "[]") return alert("No history to backup!");
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Business_Logs_Backup_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
            a.click();
        }

        function importBackup(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (confirm("This will overwrite your current local history. Continue?")) {
                            localStorage.setItem('businessLogHistory', JSON.stringify(importedData));
                            location.reload();
                        }
                    } catch (err) { alert("Invalid backup file."); }
                };
                reader.readAsText(file);
            }
        }

        function clearHistory() {
            if (confirm("⚠️ Permanent Wipe: This deletes all saved logs. Proceed?")) {
                localStorage.removeItem('businessLogHistory');
                location.reload();
            }
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
