<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 30px; }
        .logo { width: 100px; height: auto; border-radius: 50%; border: 2px solid #a855f7; }
        h1 { color: #a855f7; text-transform: uppercase; margin: 10px 0; }
        .nav-link { color: #38bdf8; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        
        .management-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 800px; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 12px; }
        .card h2 { color: #38bdf8; border-bottom: 1px solid #1e293b; padding-bottom: 10px; margin-top: 0; }
        
        .log-entry { 
            background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #a855f7;
        }
        .log-header-date { color: #a855f7; font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .log-filename { color: #94a3b8; font-size: 0.8rem; margin-bottom: 10px; display: block; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 8px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .prev-btn { background: #38bdf8; color: #020617; }
        .del-btn { background: #ef4444; color: white; }

        /* Preview Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-box { background: #0f172a; padding: 20px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; border: 1px solid #38bdf8; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { padding: 8px; border-bottom: 1px solid #1e293b; text-align: left; }
    </style>
</head>
<body>

    <div id="modal"><div class="modal-box"><button onclick="closeModal()" style="background:#ef4444; color:white; margin-bottom:10px;">CLOSE</button><div id="modal-body"></div></div></div>

    <header>
        <img src="https://i.postimg.cc/dtHffs97/75cb50d9389d910e9781b944fceed68b.webp" alt="Logo" class="logo">
        <h1>Management Portal</h1>
    </header>

    <a href="index.html" class="nav-link">← Return to Staff Logs</a>

    <div class="management-grid">
        <div class="card">
            <h2>📁 Saved Log History</h2>
            <div id="log-history-list"></div>
        </div>
    </div>

    <script>
        window.onload = displayHistory;

        function displayHistory() {
            const list = document.getElementById('log-history-list');
            const logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            
            if (logs.length === 0) {
                list.innerHTML = "<p style='text-align:center; opacity:0.5;'>No logs saved. Go to the main page and click 'Save to Portal' after uploading a CSV.</p>";
                return;
            }

            list.innerHTML = "";
            logs.slice().reverse().forEach((log, index) => {
                const actualIndex = logs.length - 1 - index;
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `
                    <span class="log-header-date">📅 ${log.date}</span>
                    <span class="log-filename">Source: ${log.fileName}</span>
                    <div class="btn-group">
                        <button class="prev-btn" onclick="previewLog(${actualIndex})">View Data</button>
                        <button class="del-btn" onclick="deleteLog(${actualIndex})">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function previewLog(idx) {
            const logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            const log = logs[idx];
            const rows = log.rawData.split('\n');
            let html = "<table><tr><th>Name</th><th>ID</th><th>Mins</th></tr>";
            for(let i=1; i<rows.length; i++) {
                if(!rows[i].trim()) continue;
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                html += `<tr><td>${cols[0].replace(/"/g,'')}</td><td>${cols[1]}</td><td>${cols[2]}</td></tr>`;
            }
            html += "</table>";
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function deleteLog(idx) { if(confirm("Delete this log?")) { let logs = JSON.parse(localStorage.getItem('businessLogHistory')); logs.splice(idx, 1); localStorage.setItem('businessLogHistory', JSON.stringify(logs)); displayHistory(); } }
    </script>
</body>
</html>
