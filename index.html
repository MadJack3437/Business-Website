<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekly Business Logs</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: #020617; font-family: 'Inter', sans-serif; color: #f1f5f9;
            display: flex; flex-direction: column; align-items: center;
        }
        header { text-align: center; padding: 20px 0 10px 0; flex-shrink: 0; }
        .logo { width: 100px; border-radius: 50%; border: 2px solid #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin: 10px 0; }
        
        .content-area {
            flex: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column;
            align-items: center; overflow-y: auto; padding: 10px; box-sizing: border-box;
        }

        #drop-zone { 
            width: 95%; max-width: 600px; padding: 40px 20px; border: 2px dashed #1e293b; 
            border-radius: 20px; background: #0f172a; cursor: pointer; text-align: center; margin: 20px 0; 
        }

        #success-toast {
            position: fixed; top: 20px; right: 20px; background: #22c55e; color: white;
            padding: 12px 24px; border-radius: 8px; font-weight: bold; transform: translateY(-100px);
            transition: 0.5s ease; z-index: 4000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #success-toast.show { transform: translateY(0); }

        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); display: none; 
            justify-content: center; align-items: center; z-index: 3000;
        }
        .login-box {
            background: #0f172a; padding: 30px; border-radius: 20px; border: 1px solid #ef4444;
            width: 90%; max-width: 350px; text-align: center;
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #1e293b;
            background: #020617; color: white; box-sizing: border-box; outline: none;
        }
        .login-box button {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none;
            background: #ef4444; color: white; font-weight: bold; cursor: pointer;
        }
        #login-error { color: #ef4444; font-size: 0.8rem; margin-top: 10px; display: none; }

        #top-three-banner {
            width: 100%; background: linear-gradient(135deg, #1e293b 0%, #3b0764 100%);
            border: 1px solid #a855f7; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: none;
        }
        .top-three-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .top-card { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        #search-container { width: 100%; margin-bottom: 15px; display: none; }
        #search-bar { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }

        .stats-bar { 
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            background: #1e293b; padding: 15px 20px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; 
        }
        .totals { font-weight: bold; color: #38bdf8; font-size: 0.95rem; }
        .actions { display: flex; gap: 8px; }
        .actions button { padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.75rem; }
        
        #copy-btn { background: #38bdf8; color: #020617; }
        #save-btn { background: #22c55e; color: white; }
        #reset-btn { background: #ef4444; color: white; }

        .section-header { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: 12px; width: 100%; box-sizing: border-box; margin-bottom: 5px; text-transform: uppercase; font-weight: 900; }
        .mgmt-header { background: linear-gradient(90deg, #0ea5e9 0%, #f97316 100%); color: #fff; border: 1px solid #fff; }
        .bc-header { background: linear-gradient(90deg, #1e293b, #78350f); color: #fbbf24; border: 1px solid #fbbf24; margin-top: 10px; }
        .member-header { background: #1e293b; color: #94a3b8; border: 1px solid #334155; margin-top: 10px; }
        .header-titles { display: grid; grid-template-columns: 1.5fr 1fr 0.8fr; width: 100%; font-size: 0.75rem; }
        
        .slide-wrapper { max-height: 2000px; overflow: hidden; transition: max-height 0.4s ease-out; background: #0f172a; border-radius: 0 0 12px 12px; width: 100%; border: 1px solid #1e293b; border-top: none; margin-bottom: 10px; }
        .collapsed + .slide-wrapper { max-height: 0; border: none; visibility: hidden; }
        .arrow-icon { transition: 0.3s; font-size: 0.7rem; }
        .collapsed .arrow-icon { transform: rotate(-90deg); }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 20px; border-bottom: 1px solid #1e293b; font-size: 0.8rem; color: #cbd5e1; word-break: break-all; }
        tr { display: grid; grid-template-columns: 1.5fr 1fr 0.8fr; align-items: center; }
        .highlight-row { background: rgba(56, 189, 248, 0.2) !important; border-left: 4px solid #38bdf8; }

        footer { width: 100%; padding: 15px 20px 25px 20px; background: #020617; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1e293b; box-sizing: border-box;}
        .mgmt-btn { padding: 12px 30px; background: #0f172a; color: #ef4444; border: 2px solid #ef4444; border-radius: 10px; font-weight: 800; cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: 0.3s;}
        .mgmt-btn:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div id="success-toast">Log Saved to Management Portal! 💾</div>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color: #ef4444; margin-top: 0;">Admin Login</h2>
            <input type="text" id="user-input" placeholder="Username">
            <input type="password" id="pass-input" placeholder="Password">
            <button onclick="checkLogin()">UNLOCK PORTAL</button>
            <button onclick="closeLogin()" style="background:transparent; color:#94a3b8; font-size:0.7rem;">Cancel</button>
            <div id="login-error">Invalid Credentials</div>
        </div>
    </div>

    <header>
        <img src="https://i.postimg.cc/dtHffs97/75cb50d9389d910e9781b944fceed68b.webp" alt="Logo" class="logo">
        <h1>Weekly Business Logs</h1>
    </header>

    <div class="content-area">
        <div id="drop-zone">
            <p>Drag & Drop CSV here or click to browse</p>
            <input type="file" id="file-input" accept=".csv" hidden>
        </div>

        <div id="table-container" style="display: none; width: 100%;">
            <div id="top-three-banner">
                <h3 style="margin: 0; color: #a855f7; font-size: 0.8rem; text-align: center;">🏆 TOP BUSINESS PERFORMERS</h3>
                <div class="top-three-grid" id="top-three-content"></div>
            </div>
            <div id="search-container">
                <input type="text" id="search-bar" placeholder="Search by Discord ID..." onkeyup="filterResults()">
            </div>
            <div class="stats-bar">
                <div class="totals"><span id="staff-count">Total: 0</span> | <span id="total-hours-sum">0 hrs</span></div>
                <div class="actions">
                    <button id="copy-btn">Copy Logs 📋</button>
                    <button id="save-btn" onclick="triggerManualSave()">Save to Portal 💾</button>
                    <button id="reset-btn" onclick="location.reload()">Clear 🗑️</button>
                </div>
            </div>
            <div class="section-header mgmt-header" onclick="toggleSection(this)"><div class="header-titles"><span>Management (ID)</span><span>KEY</span><span>Time</span></div><span class="arrow-icon">▼</span></div>
            <div class="slide-wrapper"><table><tbody id="mgmt-table-body"></tbody></table></div>
            <div class="section-header bc-header" onclick="toggleSection(this)"><div class="header-titles"><span>Coordination (ID)</span><span>KEY</span><span>Time</span></div><span class="arrow-icon">▼</span></div>
            <div class="slide-wrapper"><table><tbody id="bc-table-body"></tbody></table></div>
            <div class="section-header member-header collapsed" onclick="toggleSection(this)"><div class="header-titles"><span>Members (ID)</span><span>KEY</span><span>Time</span></div><span class="arrow-icon">▼</span></div>
            <div class="slide-wrapper"><table><tbody id="member-table-body"></tbody></table></div>
        </div>
    </div>

    <footer>
        <span style="font-size: 0.65rem; color: #475569;">SACRP BUSINESS MANAGEMENT</span>
        <button class="mgmt-btn" onclick="openLogin()">🔓 PORTAL</button>
    </footer>

    <script>
        let currentFileData = null;
        let currentFileName = "";

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        function openLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
        function closeLogin() { document.getElementById('login-overlay').style.display = 'none'; }
        
        function checkLogin() {
            if(document.getElementById('user-input').value === "ADMIN" && document.getElementById('pass-input').value === "ADMIN") {
                window.location.href = "management.html";
            } else { document.getElementById('login-error').style.display = 'block'; }
        }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            currentFileName = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentFileData = ev.target.result;
                processCSV(currentFileData);
            };
            reader.readAsText(file);
        };

        function triggerManualSave() {
            if(!currentFileData) return;
            const history = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            history.push({ date: new Date().toLocaleString(), fileName: currentFileName, rawData: currentFileData });
            localStorage.setItem('businessLogHistory', JSON.stringify(history));
            
            const toast = document.getElementById('success-toast');
            toast.classList.add('show');
            document.getElementById('save-btn').disabled = true;
            document.getElementById('save-btn').style.opacity = "0.5";
            document.getElementById('save-btn').innerText = "Saved ✅";
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function toggleSection(el) { el.classList.toggle('collapsed'); }

        function filterResults() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('tbody tr').forEach(row => {
                const idText = row.cells[0].innerText.toLowerCase();
                if (query === "" || idText.includes(query)) {
                    row.style.display = 'grid';
                    if(query !== "") {
                        row.classList.add('highlight-row');
                        row.closest('.slide-wrapper').previousElementSibling.classList.remove('collapsed');
                    }
                } else { row.style.display = 'none'; }
            });
        }

        function processCSV(text) {
            const lines = text.trim().split(/\r?\n/).filter(r => r.trim() !== '');
            const mgmtTable = document.getElementById('mgmt-table-body');
            const bcTable = document.getElementById('bc-table-body');
            const memTable = document.getElementById('member-table-body');
            mgmtTable.innerHTML = ''; bcTable.innerHTML = ''; memTable.innerHTML = '';
            let totalCount = 0, totalMins = 0, allStaff = [], discordText = "**Weekly Business Logs:**\n";

            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 4) continue;
                const id = cols[1].replace(/"/g, '').trim();
                const keyName = cols[2].replace(/"/g, '').trim();
                const mins = parseInt(cols[3].replace(/"/g, '')) || 0;
                const hrs = (mins / 60).toFixed(1);
                allStaff.push({ id, mins, hrs });
                const rowHtml = `<tr><td>${id}</td><td style="color:#94a3b8; font-style: italic;">${keyName}</td><td style="color:#4ade80; font-weight:bold;">${hrs} hrs</td></tr>`;
                const upperKey = keyName.toUpperCase();
                if (upperKey === "BUSMAN") { mgmtTable.innerHTML += rowHtml; discordText += `• [MGMT] <@${id}> (${keyName}): ${hrs} hrs\n`; }
                else if (upperKey === "BC") { bcTable.innerHTML += rowHtml; discordText += `• [BC] <@${id}> (${keyName}): ${hrs} hrs\n`; }
                else { memTable.innerHTML += rowHtml; discordText += `• <@${id}> (${keyName}): ${hrs} hrs\n`; }
                totalCount++; totalMins += mins;
            }

            allStaff.sort((a, b) => b.mins - a.mins);
            const topThreeContainer = document.getElementById('top-three-content');
            topThreeContainer.innerHTML = '';
            allStaff.slice(0, 3).forEach((staff, index) => {
                topThreeContainer.innerHTML += `<div class="top-card"><div style="font-size:1.2rem">${['🥇', '🥈', '🥉'][index]}</div><div style="font-size:0.7rem; color:#94a3b8"><@${staff.id}></div><div style="font-weight:bold">${staff.hrs} hrs</div></div>`;
            });

            document.getElementById('table-container').style.display = 'block';
            document.getElementById('search-container').style.display = 'block';
            document.getElementById('top-three-banner').style.display = 'block';
            document.getElementById('drop-zone').style.display = 'none';
            document.getElementById('staff-count').innerText = `Total: ${totalCount}`;
            document.getElementById('total-hours-sum').innerText = `${(totalMins/60).toFixed(1)} hrs`;
            document.getElementById('copy-btn').onclick = () => {
                navigator.clipboard.writeText(`${discordText}\n**Summary:**\n• Headcount: ${totalCount}\n• Combined Time: ${(totalMins/60).toFixed(1)} hrs`);
                alert("Logs & Summary Copied!");
            };
        }
    </script>
</body>
</html>
