<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Business Logs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/dtHffs97/75cb50d9389d910e9781b944fceed68b.webp" alt="Business Logo" class="logo">
        <h1>Weekly Business Logs</h1>
        <p>Drop your <b>CSV</b> file here to calculate staff hours.</p>
    </header>

    <main>
        <div id="drop-zone">
            <p>Drag & Drop Duty Log CSV here <br><span>or click to browse</span></p>
            <input type="file" id="file-input" accept=".csv" hidden>
        </div>

        <div id="table-container" style="display: none;">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by name or Discord ID...">
            </div>

            <div class="stats-bar">
                <div class="totals">
                    <span id="staff-count">Total Staff: 0</span> | 
                    <span id="total-hours-sum">Total Hours: 0</span>
                </div>
                <button id="copy-btn">Copy for Discord 📋</button>
                <button id="reset-btn">Clear All 🗑️</button>
            </div>

            <table id="hours-table">
                <thead>
                    <tr>
                        <th>Staff Name</th>
                        <th>Discord ID</th>
                        <th>Total Hours</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </main>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const tableBody = document.getElementById('table-body');
        const tableContainer = document.getElementById('table-container');
        const copyBtn = document.getElementById('copy-btn');
        const resetBtn = document.getElementById('reset-btn');
        const searchInput = document.getElementById('search-input');
        let discordOutput = "";

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => parseDutyCSV(e.target.result);
            reader.readAsText(file);
        }

        function cleanName(name) {
            return name.replace(/~.*?~/g, '').replace(/"/g, '').trim();
        }

        function csvToArray(text) {
            const result = [];
            let row = [];
            let q = false;
            let buffer = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') q = !q;
                else if (char === ',' && !q) { row.push(buffer); buffer = ""; }
                else if (char === '\n' && !q) { row.push(buffer); result.push(row); row = []; buffer = ""; }
                else { buffer += char; }
            }
            if (buffer) row.push(buffer);
            if (row.length > 0) result.push(row);
            return result;
        }

        function parseDutyCSV(text) {
            const data = csvToArray(text);
            const headers = data[0].map(h => h.trim().toLowerCase());
            const nameIdx = headers.indexOf('name');
            const idIdx = headers.indexOf('id');
            const timeIdx = headers.indexOf('time');

            tableBody.innerHTML = '';
            let count = 0;
            let totalMins = 0;
            discordOutput = "**Weekly Business Logs:**\n";

            for (let i = 1; i < data.length; i++) {
                const columns = data[i];
                if (columns.length < 3) continue;
                const name = cleanName(columns[nameIdx] || "Unknown");
                const discordId = (columns[idIdx] || "N/A").trim();
                const minutes = parseInt(columns[timeIdx]) || 0;
                const hours = (minutes / 60).toFixed(1);

                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${name}</td><td>${discordId}</td><td class="hours-val">${hours} hrs</td>`;
                tableBody.appendChild(tr);
                
                discordOutput += `• **${name}**: ${hours} hours\n`;
                count++;
                totalMins += minutes;
            }
            
            document.getElementById('staff-count').innerText = `Total Staff: ${count}`;
            document.getElementById('total-hours-sum').innerText = `Total Hours: ${(totalMins/60).toFixed(1)}`;
            tableContainer.style.display = 'block';
            dropZone.style.display = 'none';
        }

        searchInput.onkeyup = function() {
            const filter = searchInput.value.toLowerCase();
            const rows = tableBody.getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                rows[i].style.display = rows[i].textContent.toLowerCase().includes(filter) ? "" : "none";
            }
        };

        resetBtn.onclick = () => {
            tableContainer.style.display = 'none';
            dropZone.style.display = 'block';
            fileInput.value = "";
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(discordOutput);
            copyBtn.innerText = "Copied! ✅";
            setTimeout(() => { copyBtn.innerText = "Copy for Discord 📋"; }, 2000);
        };
    </script>
</body>
</html>
