<div class="stats-bar">
    <div class="totals">
        <span id="staff-count">Members: 0</span> | 
        <span id="total-hours-sum">Total: 0 hrs</span>
    </div>
    <div class="actions" id="button-actions">
        <button id="copy-btn">Copy for Discord 📋</button>
        <button id="reset-btn">Clear 🗑️</button>
    </div>
</div>

<script>
    // ... keep your existing cleanData and other helper functions ...

    function handleFile(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const text = e.target.result;
            const rows = text.split(/\r?\n/);
            if (rows.length < 2) return;

            // ... your existing table processing logic ...
            // Make sure your processing logic is here to fill the table

            // --- NEW: Inject the Save Button ---
            const actionArea = document.getElementById('button-actions');
            
            // Remove old save button if it exists to avoid duplicates
            const oldSave = document.getElementById('save-to-portal');
            if (oldSave) oldSave.remove();

            const saveBtn = document.createElement('button');
            saveBtn.id = 'save-to-portal';
            saveBtn.innerText = '💾 Save to Portal';
            // Styling it green so it stands out
            saveBtn.style.cssText = "background: #22c55e; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 0 5px;";
            
            saveBtn.onclick = () => {
                const logDate = new Date().toLocaleString();
                const savedLogs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
                
                savedLogs.push({
                    date: logDate,
                    fileName: file.name,
                    rawData: text
                });
                
                localStorage.setItem('businessLogHistory', JSON.stringify(savedLogs));
                
                saveBtn.innerText = '✅ Saved!';
                saveBtn.style.background = '#64748b'; // Change to grey after saving
                saveBtn.disabled = true;
            };

            // Insert the save button before the "Clear" button
            actionArea.insertBefore(saveBtn, document.getElementById('reset-btn'));
            
            // Show the table container
            document.getElementById('table-container').style.display = 'block';
            document.getElementById('drop-zone').style.display = 'none';
        };
        reader.readAsText(file);
    }
</script>
