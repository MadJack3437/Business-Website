<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekly Business Logs</title>
    <style>
        /* FIX: Removes all annoying scrollbars from the edges */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #020617; 
            font-family: 'Inter', sans-serif;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; padding: 20px 0 10px 0; flex-shrink: 0; }
        .logo { width: 100px; border-radius: 50%; border: 2px solid #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin: 10px 0; }
        
        /* Main Container - This is the only part that can scroll if the table is long */
        .content-area {
            flex: 1;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto; 
            padding: 10px;
            box-sizing: border-box;
            scrollbar-width: thin;
            scrollbar-color: #1e293b #020617;
        }

        #drop-zone { 
            width: 95%; 
            max-width: 600px; 
            padding: 60px 20px; 
            border: 2px dashed #1e293b; 
            border-radius: 20px; 
            background: #0f172a; 
            cursor: pointer; 
            text-align: center; 
            margin: 20px 0; 
            transition: 0.3s;
        }
        #drop-zone:hover { border-color: #38bdf8; background: #1e293b; }

        .stats-bar { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #1e293b; 
            padding: 15px 20px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
        }
        
        .totals { font-weight: bold; color: #38bdf8; font-size: 0.95rem; }
        .actions { display: flex; gap: 10px; }
        .actions button { padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.85rem; transition: 0.2s; }
        .actions button:active { transform: scale(0.95); }
        
        #copy-btn { background: #38bdf8; color: #020617; }
        #save-btn { background: #22c55e; color: white; display: none; }
        #reset-btn { background: #ef4444; color: white; }

        table { width: 100%; border-collapse: collapse; background: #0f172a; border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
        th { background: #1e293b; color: #38bdf8; padding: 14px; text-align: left; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; color: #cbd5e1; }
        tr:hover { background: rgba(56, 189, 248, 0.05); }
        
        footer { 
            width: 100%; 
            padding: 20px 0; 
            background: #020617; 
            text-align: center; 
            flex-shrink: 0; 
            border-top: 1px solid #1e293b;
            z-index: 10;
        }
        .mgmt-btn { padding: 12px 30px; background: #0f172a; color: #a855f7; border: 2px solid #a855f7; border-radius: 10px; font-weight: 800; cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .mgmt-btn:hover { background: #a855f7; color: white; box-shadow: 0 0 15px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/dtHffs97/75cb50d9389d910e9781b944fceed68b.webp" alt="Logo" class="logo">
        <h1>Weekly Business Logs</h1>
    </header>

    <div class="content-area">
        <div id="drop-zone">
            <p style="font-size: 1.1rem; color: #94a3b8;">Drag & Drop CSV here</p>
            <p style="font-size: 0.8rem; color: #64748b;">or click to browse your files</p>
            <input type="file" id="file-input" accept=".csv" hidden>
        </div>

        <div id="table-container" style="display: none; width: 100%;">
            <div class="stats-bar">
                <div class="totals">
                    <span id="staff-count">Members: 0</span> | <span id="total-hours-sum">Total: 0 hrs</span>
                </div>
                <div class="actions">
                    <button id="copy-btn">Copy Discord 📋</button>
                    <button id="save-btn">Save to Portal 💾</button>
                    <button id="reset-btn" onclick="clearEverything()">Clear 🗑️</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Discord ID</th>
                        <th>Duty Time</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <footer>
        <a href="#" onclick="checkAdmin()" class="mgmt-btn">🔓 OPEN MANAGEMENT PORTAL</a>
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const saveBtn = document.getElementById('save-btn');
        let currentFileData = "";
        let currentFileName = "";

        // RECOVERY: Rebuilds the table if you hit "Back" from the portal
        window.onload = () => {
            const savedSession = sessionStorage.getItem('activeLog');
            if (savedSession) {
                const data = JSON.parse(savedSession);
                processCSV(data.content, data.name);
            }
        };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    const text = re.target.result;
                    processCSV(text, file.name);
                    // Store in temporary memory for navigation
                    sessionStorage.setItem('activeLog', JSON.stringify({ content: text, name: file.name }));
                };
                reader.readAsText(file);
            }
        };

        function processCSV(text, filename) {
            currentFileData = text;
            currentFileName = filename;
            const rows = text.split(/\r?\n/);
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            
            let totalMins = 0;
            let count = 0;
            let discordText = "**Weekly Business Logs:**\n";

            for (let i = 1; i < rows.length; i++) {
                // Advanced split to handle names with commas inside quotes
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 3) continue;
                
                const name = cols[0].replace(/["~]/g, '').trim();
                const id = cols[1].replace(/"/g, '').trim();
                const mins = parseInt(cols[2].replace(/"/g, '')) || 0;
                const hrs = (mins / 60).toFixed(1);

                tableBody.innerHTML += `<tr><td>${name}</td><td>${id}</td><td style="color:#4ade80; font-weight:bold;">${hrs} hrs</td></tr>`;
                discordText += `• **${name}**: ${hrs} hrs\n`;
                totalMins += mins;
                count++;
            }

            document.getElementById('staff-count').innerText = `Members: ${count}`;
            document.getElementById('total-hours-sum').innerText = `Total: ${(totalMins/60).toFixed(1)} hrs`;
            document.getElementById('table-container').style.display = 'block';
            document.getElementById('drop-zone').style.display = 'none';
            
            // Activate the Save Button
            saveBtn.style.display = 'inline-block';
            saveBtn.innerText = "Save to Portal 💾";
            saveBtn.style.background = "#22c55e";
            saveBtn.disabled = false;

            document.getElementById('copy-btn').onclick = () => {
                navigator.clipboard.writeText(discordText);
                alert("Discord format copied to clipboard!");
            };
        }

        saveBtn.onclick = () => {
            const logs = JSON.parse(localStorage.getItem('businessLogHistory')) || [];
            logs.push({
                date: new Date().toLocaleString(),
                fileName: currentFileName,
                rawData: currentFileData
            });
            localStorage.setItem('businessLogHistory', JSON.stringify(logs));
            
            saveBtn.innerText = "✅ Saved to Portal!";
            saveBtn.style.background = "#64748b";
            saveBtn.disabled = true;
        };

        function clearEverything() {
            sessionStorage.removeItem('activeLog');
            location.reload();
        }

        function checkAdmin() {
            const user = prompt("User:");
            const pass = prompt("Pass:");
            if(user === "ADMIN" && pass === "ADMIN") {
                window.location.href = "management.html";
            } else {
                alert("Access Denied");
            }
        }
    </script>
</body>
</html>
