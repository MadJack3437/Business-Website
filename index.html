<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Weekly Schedule Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    
    <style>
        :root {
            --bg: #020617;
            --card-bg: #0f172a;
            --text: #f1f5f9;
            --sub-text: #94a3b8;
            --border: #1e293b;
            --primary: #38bdf8;
            --accent: #ef4444;
            --success: #22c55e;
        }

        .light-mode {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --sub-text: #64748b;
            --border: #e2e8f0;
            --primary: #0ea5e9;
            --accent: #dc2626;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--text);
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        * { box-sizing: border-box; }

        header { text-align: center; padding: 30px 0 10px 0; width: 100%; position: relative; }
        
        .theme-toggle {
            position: absolute; top: 25px; right: 20px;
            background: var(--card-bg); border: 1px solid var(--border);
            color: var(--text); padding: 8px; border-radius: 50%;
            cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            z-index: 100; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; font-size: 1.4rem; margin: 10px 0; font-weight: 900; }
        
        .content-area { flex: 1; width: 95%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; padding: 10px 0; }

        #drop-zone { 
            width: 100%; max-width: 700px; padding: 40px 20px; border: 2px dashed var(--border); 
            border-radius: 20px; background: var(--card-bg); cursor: pointer; text-align: center; margin: 20px 0; 
            transition: border-color 0.2s;
        }
        #drop-zone:hover { border-color: var(--primary); }
        #drop-zone p { margin: 8px 0; font-size: 1rem; color: var(--sub-text); }
        #drop-zone .highlight-text { color: var(--primary); font-weight: bold; }

        #loading-overlay {
            display: none; align-items: center; justify-content: center; gap: 10px;
            margin: 15px 0; font-weight: bold; color: var(--primary);
        }

        .stats-bar { 
            width: 100%; display: flex; justify-content: space-between; align-items: center; 
            background: var(--card-bg); padding: 15px 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border);
        }
        .totals { font-weight: bold; color: var(--text); font-size: 0.95rem; }
        .actions { display: flex; gap: 8px; }
        .actions button { padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; transition: 0.2s; }
        
        #gcal-btn { background: var(--primary); color: #020617; }
        #clear-btn { background: var(--accent); color: white; }

        #calendar-container {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* FullCalendar Custom Theming */
        .fc { --fc-border-color: var(--border); --fc-page-bg-color: var(--card-bg); color: var(--text); }
        .fc .fc-col-header-cell-cushion { color: var(--text); padding: 10px 0; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        .fc .fc-timegrid-slot-label-cushion { color: var(--sub-text); font-size: 0.75rem; }
        .fc-theme-standard .fc-scrollgrid { border-radius: 12px; overflow: hidden; }
        .fc-event { background-color: rgba(56, 189, 248, 0.15) !important; border: 1px solid var(--primary) !important; color: var(--text) !important; padding: 2px 4px; border-radius: 4px; }

        #toast {
            position: fixed; top: 20px; right: 20px; background: var(--success); color: white;
            padding: 12px 24px; border-radius: 8px; font-weight: bold; transform: translateY(-100px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 7000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #toast.show { transform: translateY(0); }

        footer { width: 100%; padding: 20px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; font-size: 0.75rem; color: var(--sub-text); }

        @media (max-width: 650px) {
            .stats-bar { flex-direction: column; gap: 15px; text-align: center; }
            .actions { width: 100%; justify-content: center; }
            .actions button { flex: 1; }
        }
    </style>
</head>
<body>

    <div id="toast">Action Successful! 📋</div>

    <header>
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
        <h1>Weekly Schedule Planner</h1>
    </header>

    <div class="content-area">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p class="highlight-text">📸 Drop schedule image here or click to browse</p>
            <p style="font-size: 0.8rem;">Supports PNG, JPG, or JPEG print tables</p>
            <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <div id="loading-overlay">
            <span>🔄 AI is converting your schedule image into data...</span>
        </div>
        
        <div class="stats-bar">
            <div class="totals">Active Schedule Dashboard</div>
            <div class="actions">
                <button id="gcal-btn" onclick="syncToGoogleCalendar()">Sync to Google Calendar 📅</button>
                <button id="clear-btn" onclick="clearSchedule()">Clear Cache 🗑️</button>
            </div>
        </div>

        <div id="calendar-container">
            <div id="calendar"></div>
        </div>
    </div>

    <footer>
        <span>AI Schedule Parser Dashboard &copy; 2026</span>
    </footer>

    <script>
        let calendarInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            initCalendar();
            setupDragAndDrop();
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('theme-btn');
            btn.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
            if (calendarInstance) calendarInstance.render();
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.background = isError ? "var(--accent)" : "var(--success)";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // --- LOCAL STORAGE CACHE HANDLERS ---
        function getCachedEvents() {
            const stored = localStorage.getItem('weekly_schedule_events');
            return stored ? JSON.parse(stored) : [];
        }

        function saveEventsToCache(events) {
            localStorage.setItem('weekly_schedule_events', JSON.stringify(events));
        }

        // --- FULLCALENDAR RENDER ENGINE ---
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            const cachedEvents = getCachedEvents();

            calendarInstance = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                slotMinTime: '07:00:00', // Adjust starting timeline view limits
                slotMaxTime: '23:00:00', // Adjust ending time view limits
                allDaySlot: false,
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridWeek,timeGridDay'
                },
                events: cachedEvents,
                height: 'auto'
            });

            calendarInstance.render();
        }

        // --- FILE HANDLING & AI PARSING CONTROLLER ---
        const fileInput = document.getElementById('file-input');
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) parseImageWithAI(file);
        };

        function setupDragAndDrop() {
            const dropZone = document.getElementById('drop-zone');
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--primary)"; }, false);
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--border)"; }, false);
            });
            dropZone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) parseImageWithAI(file);
            });
        }

        async function parseImageWithAI(file) {
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';

            const formData = new FormData();
            formData.append('scheduleImage', file);

            try {
                // Target your local engine or serverless backend endpoint route here
                const response = await fetch('/api/parse-schedule', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error("Server failed processing request.");
                
                const structuredEvents = await response.json();
                
                // Save clean formatted structural models onto internal local cache
                saveEventsToCache(structuredEvents);
                
                // Dynamically update the application view layer on completion
                if(calendarInstance) {
                    calendarInstance.removeAllEvents();
                    calendarInstance.addEventSource(structuredEvents);
                }
                
                showToast("Schedule imported and rendered successfully!");
            } catch (error) {
                console.error(error);
                // Mock execution fallback layout for safe playground structural visual testing:
                generateMockParsedSchedule();
            } finally {
                loader.style.display = 'none';
            }
        }

        // Fallback simulation generator if you test without a cloud backend connected yet
        function generateMockParsedSchedule() {
            const targetMonday = getUpcomingMonday();
            const formatIso = (dateStr, timeStr) => `${dateStr}T${timeStr}:00`;
            
            const monDate = targetMonday.toISOString().split('T')[0];
            const tueDate = new Date(targetMonday.getTime() + 86400000).toISOString().split('T')[0];

            const mockEvents = [
                { title: "Check In", start: formatIso(monDate, "11:00"), end: formatIso(monDate, "12:15") },
                { title: "Lunch / Dishes Crew", start: formatIso(monDate, "12:15"), end: formatIso(monDate, "12:45") },
                { title: "Waterfront + Canoeing Setup", start: formatIso(monDate, "14:30"), end: formatIso(monDate, "16:30") },
                { title: "Breakfast Activities", start: formatIso(tueDate, "08:00"), end: formatIso(tueDate, "09:15") },
                { title: "Archery / Go-Karts (Group Multi)", start: formatIso(tueDate, "09:30"), end: formatIso(tueDate, "10:10") }
            ];

            saveEventsToCache(mockEvents);
            if(calendarInstance) {
                calendarInstance.removeAllEvents();
                calendarInstance.addEventSource(mockEvents);
            }
            showToast("Showing local mock setup parsing layout demonstration data.", true);
        }

        function getUpcomingMonday() {
            const d = new Date();
            const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        // --- CLEAN UP ELEMENT COMMAND ---
        function clearSchedule() {
            if (confirm("Are you sure you want to completely wipe out the schedule cache from this device?")) {
                localStorage.removeItem('weekly_schedule_events');
                if (calendarInstance) {
                    calendarInstance.removeAllEvents();
                }
                showToast("Local device cache cleared!");
            }
        }

        // --- GOOGLE CALENDAR API CONNECTOR HOOK ---
        function syncToGoogleCalendar() {
            const currentEvents = getCachedEvents();
            if(currentEvents.length === 0) {
                showToast("There are no active loaded events to synchronize.", true);
                return;
            }
            
            showToast("Initiating secure integration link routing...");
            // Integrate with Google Identity GAPI OAuth tokens inside this code block downstream
        }
    </script>
</body>
</html>
